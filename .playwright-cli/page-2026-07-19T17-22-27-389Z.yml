      - heading "Найпоширеніші питання" [level=2] [ref=f7e99]
      - list [ref=f7e100]:
        - listitem [ref=f7e101]:
          - button "Як дізнатись ціну?" [ref=f7e102] [cursor=pointer]
          - paragraph [ref=f7e104]: Залиште заявку на навчання, і найближчим часом з вами зв’яжеться наш менеджер-консультант, щоб розрахувати для вас фінальну вартість курсу. Вона залежить від того, який формат (онлайн або офлайн) і пакет (від 4 до 36 занять) ви оберете, а також від міста, можливих пільг і поточних знижок.
        - listitem [ref=f7e105]:
          - button "Який розклад занять?" [ref=f7e106] [cursor=pointer]
          - paragraph [ref=f7e108]: Графік у кожної групи індивідуальний. Більшість груп з програмування займається по вихідним 1 раз на тиждень. Тривалість 1 заняття — 90 хв. З англійської мови заняття проходять двічі на тиждень, тривалість — 90 хв/заняття.
        - listitem [ref=f7e109]:
          - button "Чи потрібно дитині мати досвід в програмуванні, щоб навчатись в Logika?" [ref=f7e110] [cursor=pointer]
          - paragraph [ref=f7e112]: Ні, досвід програмування не обов’язковий. Ми навчаємо з нуля.
        - listitem [ref=f7e113]:
          - button "Чи потрібно мати ноутбук для занять?" [ref=f7e114] [cursor=pointer]
          - paragraph [ref=f7e116]: На уроки в класі ми забезпечуємо учнів всім необхідним. Для онлайн занять, а також для виконання домашньої практики потрібен комп’ютер (ноутбук). Програми курсів не вимагають надпотужного приладу.
        - listitem [ref=f7e117]:
          - button "Хто викладає курси?" [ref=f7e118] [cursor=pointer]
          - paragraph [ref=f7e120]: У нас працюють висококваліфіковані викладачі з профільною освітою та досвідом роботи з дітьми. Всі викладачі проходять багаторівневе тестування та навчання за методологією Logika. Ми обираємо тих, хто закоханий у свою справу.
        - listitem [ref=f7e121]:
          - button "У нашому місті немає школи Logika. Чи можемо ми навчатись віддалено?" [ref=f7e122] [cursor=pointer]
          - paragraph [ref=f7e124]: "Так! У Logika є своя онлайн-школа. Ви можете займатися з будь-якої точки світу: все, що потрібно – доступ до інтернету. А щоб викладач міг приділити увагу кожній дитині, онлайн-заняття проходять в невеликих групах до 12 дітей."
        - listitem [ref=f7e125]:
          - button "Чи отримає дитина диплом?" [ref=f7e126] [cursor=pointer]
          - paragraph [ref=f7e128]: Так! По закінченню курсу у кожної групи є випускне заняття, де учні захищають свої проєкти та отримують іменні дипломи.
