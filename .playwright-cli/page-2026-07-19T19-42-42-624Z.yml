      - list [ref=f28e305]:
        - listitem [ref=f28e306]:
          - button "Чи є FAQ для міста?" [ref=f28e307] [cursor=pointer]
          - paragraph [ref=f28e309]: Так, це відповідь із ACF.
        - listitem [ref=f28e310]:
          - button "Чи є FAQ для курсу?" [ref=f28e311] [cursor=pointer]
          - paragraph [ref=f28e313]: Так, це відповідь курсу.
        - listitem [ref=f28e314]:
          - button "Для якого віку підходять курси?" [ref=f28e315] [cursor=pointer]
          - paragraph [ref=f28e317]: Курси розраховані на дітей і підлітків від 7 до 17 років.
        - listitem [ref=f28e318]:
          - button "У якому форматі проходить навчання?" [ref=f28e319] [cursor=pointer]
          - paragraph [ref=f28e321]: Доступні онлайн- та офлайн-заняття.
        - listitem [ref=f28e322]:
          - button "Чи можна відвідати пробний урок?" [ref=f28e323] [cursor=pointer]
          - paragraph [ref=f28e325]: Так, перший урок безкоштовний.
        - listitem [ref=f28e326]:
          - button "Як дізнатись ціну?" [ref=f28e327] [cursor=pointer]
          - paragraph [ref=f28e329]: Залиште заявку на навчання, і найближчим часом з вами зв’яжеться наш менеджер-консультант, щоб розрахувати для вас фінальну вартість курсу. Вона залежить від того, який формат (онлайн або офлайн) і пакет (від 4 до 36 занять) ви оберете, а також від міста, можливих пільг і поточних знижок.
        - listitem [ref=f28e330]:
          - button "Який розклад занять?" [ref=f28e331] [cursor=pointer]
          - paragraph [ref=f28e333]: Графік у кожної групи індивідуальний. Більшість груп з програмування займається по вихідним 1 раз на тиждень. Тривалість 1 заняття — 90 хв. З англійської мови заняття проходять двічі на тиждень, тривалість — 90 хв/заняття.
        - listitem [ref=f28e334]:
          - button "Чи потрібно дитині мати досвід в програмуванні, щоб навчатись в Logika?" [ref=f28e335] [cursor=pointer]
          - paragraph [ref=f28e337]: Ні, досвід програмування не обов’язковий. Ми навчаємо з нуля.
        - listitem [ref=f28e338]:
          - button "Чи потрібно мати ноутбук для занять?" [ref=f28e339] [cursor=pointer]
          - paragraph [ref=f28e341]: На уроки в класі ми забезпечуємо учнів всім необхідним. Для онлайн занять, а також для виконання домашньої практики потрібен комп’ютер (ноутбук). Програми курсів не вимагають надпотужного приладу.
        - listitem [ref=f28e342]:
          - button "Хто викладає курси?" [ref=f28e343] [cursor=pointer]
          - paragraph [ref=f28e345]: У нас працюють висококваліфіковані викладачі з профільною освітою та досвідом роботи з дітьми. Всі викладачі проходять багаторівневе тестування та навчання за методологією Logika. Ми обираємо тих, хто закоханий у свою справу.
        - listitem [ref=f28e346]:
          - button "У нашому місті немає школи Logika. Чи можемо ми навчатись віддалено?" [ref=f28e347] [cursor=pointer]
          - paragraph [ref=f28e349]: "Так! У Logika є своя онлайн-школа. Ви можете займатися з будь-якої точки світу: все, що потрібно – доступ до інтернету. А щоб викладач міг приділити увагу кожній дитині, онлайн-заняття проходять в невеликих групах до 12 дітей."
        - listitem [ref=f28e350]:
          - button "Чи отримає дитина диплом?" [ref=f28e351] [cursor=pointer]
          - paragraph [ref=f28e353]: Так! По закінченню курсу у кожної групи є випускне заняття, де учні захищають свої проєкти та отримують іменні дипломи.
