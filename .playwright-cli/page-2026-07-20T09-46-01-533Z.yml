          - paragraph [ref=e345]: Так, це відповідь із ACF.
        - listitem [ref=e346]:
          - button "Чи є FAQ для курсу?" [ref=e347] [cursor=pointer]
          - paragraph [ref=e349]: Так, це відповідь курсу.
        - listitem [ref=e350]:
          - button "Для якого віку підходять курси?" [ref=e351] [cursor=pointer]
          - paragraph [ref=e353]: Курси розраховані на дітей і підлітків від 7 до 17 років.
        - listitem [ref=e354]:
          - button "У якому форматі проходить навчання?" [ref=e355] [cursor=pointer]
          - paragraph [ref=e357]: Доступні онлайн- та офлайн-заняття.
        - listitem [ref=e358]:
          - button "Чи можна відвідати пробний урок?" [ref=e359] [cursor=pointer]
          - paragraph [ref=e361]: Так, перший урок безкоштовний.
        - listitem [ref=e362]:
          - button "Як дізнатись ціну?" [ref=e363] [cursor=pointer]
          - paragraph [ref=e365]: Залиште заявку на навчання, і найближчим часом з вами зв’яжеться наш менеджер-консультант, щоб розрахувати для вас фінальну вартість курсу. Вона залежить від того, який формат (онлайн або офлайн) і пакет (від 4 до 36 занять) ви оберете, а також від міста, можливих пільг і поточних знижок.
        - listitem [ref=e366]:
          - button "Який розклад занять?" [ref=e367] [cursor=pointer]
          - paragraph [ref=e369]: Графік у кожної групи індивідуальний. Більшість груп з програмування займається по вихідним 1 раз на тиждень. Тривалість 1 заняття — 90 хв. З англійської мови заняття проходять двічі на тиждень, тривалість — 90 хв/заняття.
        - listitem [ref=e370]:
          - button "Чи потрібно дитині мати досвід в програмуванні, щоб навчатись в Logika?" [ref=e371] [cursor=pointer]
          - paragraph [ref=e373]: Ні, досвід програмування не обов’язковий. Ми навчаємо з нуля.
        - listitem [ref=e374]:
          - button "Чи потрібно мати ноутбук для занять?" [ref=e375] [cursor=pointer]
          - paragraph [ref=e377]: На уроки в класі ми забезпечуємо учнів всім необхідним. Для онлайн занять, а також для виконання домашньої практики потрібен комп’ютер (ноутбук). Програми курсів не вимагають надпотужного приладу.
        - listitem [ref=e378]:
          - button "Хто викладає курси?" [ref=e379] [cursor=pointer]
          - paragraph [ref=e381]: У нас працюють висококваліфіковані викладачі з профільною освітою та досвідом роботи з дітьми. Всі викладачі проходять багаторівневе тестування та навчання за методологією Logika. Ми обираємо тих, хто закоханий у свою справу.
        - listitem [ref=e382]:
          - button "У нашому місті немає школи Logika. Чи можемо ми навчатись віддалено?" [ref=e383] [cursor=pointer]
          - paragraph [ref=e385]: "Так! У Logika є своя онлайн-школа. Ви можете займатися з будь-якої точки світу: все, що потрібно – доступ до інтернету. А щоб викладач міг приділити увагу кожній дитині, онлайн-заняття проходять в невеликих групах до 12 дітей."
        - listitem [ref=e386]:
          - button "Чи отримає дитина диплом?" [ref=e387] [cursor=pointer]
          - paragraph [ref=e389]: Так! По закінченню курсу у кожної групи є випускне заняття, де учні захищають свої проєкти та отримують іменні дипломи.
